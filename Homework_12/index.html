<html lang="en">

<head>
	<!-- Кодування тексту -->
	<meta charset="UTF-8">
	<!-- Налаштування в'юпорту (адаптиву, масштабу тощо) -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- Підключення віддалених шрифтів -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap" rel="stylesheet">
	<!-- Файл підключення локальних шрифтів -->
	<link rel="stylesheet" href="css/fonts.css">
	<!-- Файл обнулення стилів -->
	<link rel="stylesheet" href="css/reset.css">
	<!--Підключення основного файлу стилів -->
	<link rel="stylesheet" href="css/style.css">
	<!-- Заголовок сторінки в браузері (вкладці) -->
	<title>Homework_12</title>
</head>

<body>
	<div class="wrapper">
		<header class="header">
			<div class="header__container">
				<h1>Анімація | CSS</h1>
			</div>
		</header>
		<main class="page">
			<div class="page__container">
				<div class="picture">

					<div class="scene">
						<div class="scene__blob"></div>
						<div class="scene__road"></div>
						<div class="scene__shadow"></div>
						<div class="road-area">
							<div class="scene__road-line scene__road-line--left"></div>
							<div class="scene__road-line scene__road-line--right"></div>
						</div>

						<div class="car">
							<div class="car__body">
								<div class="car__cabin">
									<div class="car__window">
										<div class="car__headrest car__headrest--left"></div>
										<div class="car__headrest car__headrest--right"></div>
									</div>
								</div>

								<div class="car__mirror car__mirror--left"></div>
								<div class="car__mirror car__mirror--right"></div>

								<div class="car__headlight car__headlight--left"></div>
								<div class="car__headlight car__headlight--right"></div>

								<div class="car__bumper">
									<div class="car__logo"></div>
									<div class="car__grille"></div>
									<div class="car__fender-light car__fender-light--left"></div>
									<div class="car__fender-light car__fender-light--right"></div>
								</div>

							</div>
							<div class="car__wheel car__wheel--left"></div>
							<div class="car__wheel car__wheel--right"></div>

						</div>
					</div>
				</div>
			</div>
		</main>
		<footer class="footer">
			<a href="https://fls.guru/csstransition.html" target="_blank" class="footer__link">CSS переходи (CSS
				transition)</a>
			<a href="https://fls.guru/cssanimation.html" target="_blank" class="footer__link">CSS анімації (CSS animation &
				@keyframes)</a>
		</footer>
	</div>
</body>

</html>
